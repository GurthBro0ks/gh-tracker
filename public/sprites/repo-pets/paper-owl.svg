<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges" role="img" aria-label="Paper Owl pixel pet">
  <!-- phase6d-creature-art: paper-owl owl body eyes ears wings beak -->
  <g id="tail-shadow" fill="#12051f">
    <rect x="24" y="48" width="16" height="6"/>
  </g>
  <g id="body" fill="#f3ecff">
    <rect x="20" y="18" width="24" height="30"/>
    <rect x="16" y="26" width="32" height="18"/>
    <rect x="24" y="48" width="16" height="4"/>
  </g>
  <g id="paper-folds" fill="#c8b8e4">
    <rect x="20" y="28" width="8" height="14"/>
    <rect x="36" y="28" width="8" height="14"/>
    <rect x="30" y="20" width="4" height="28" opacity=".65"/>
  </g>
  <g id="ear-tufts" fill="#d717ff">
    <rect x="18" y="12" width="8" height="8"/>
    <rect x="38" y="12" width="8" height="8"/>
    <rect x="20" y="10" width="4" height="2"/>
    <rect x="40" y="10" width="4" height="2"/>
  </g>
  <g id="face-discs" fill="#53b4ff">
    <rect x="20" y="22" width="12" height="12"/>
    <rect x="32" y="22" width="12" height="12"/>
  </g>
  <g id="eyes" fill="#12051f">
    <rect x="24" y="26" width="5" height="5"/>
    <rect x="36" y="26" width="5" height="5"/>
  </g>
  <g id="eye-glints" fill="#f3ecff">
    <rect x="24" y="26" width="2" height="2"/>
    <rect x="36" y="26" width="2" height="2"/>
  </g>
  <g id="beak-and-feet" fill="#ffc44d">
    <rect x="30" y="34" width="4" height="4"/>
    <rect x="28" y="52" width="4" height="4"/>
    <rect x="36" y="52" width="4" height="4"/>
  </g>
  <g id="wing-edges" fill="#97ff4c">
    <rect x="14" y="34" width="6" height="10"/>
    <rect x="44" y="34" width="6" height="10"/>
  </g>
</svg>
